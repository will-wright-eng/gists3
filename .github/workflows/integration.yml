# Live-API tests run on a schedule rather than per-PR to respect GitHub's
# rate limits. Requires a GIST_TOKEN repository secret (PAT, gist scope);
# the tests skip themselves when it is absent.
name: integration

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: live API tests
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: go test -tags integration -run Integration -v ./...
      - name: run example (end-to-end smoke test)
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          if [ -n "$GIST_TOKEN" ]; then
            go run ./cmd/example
          else
            echo "GIST_TOKEN secret not set; skipping example run"
          fi
