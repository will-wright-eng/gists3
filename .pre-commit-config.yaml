# Mirrors `make check`: gofmt, vet (both tag sets), staticcheck, race-enabled
# unit tests, build. Hooks call the Makefile so the commands live in one
# place. Install with: pre-commit install
repos:
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt (check only)
        entry: make fmt-check
        language: system
        files: '\.go$'
        pass_filenames: false
      - id: go-vet
        name: go vet
        entry: make vet
        language: system
        files: '\.go$|go\.(mod|sum)$'
        pass_filenames: false
      - id: staticcheck
        name: staticcheck
        entry: make lint
        language: system
        files: '\.go$|go\.(mod|sum)$'
        pass_filenames: false
      - id: go-test-race
        name: unit tests (race detector)
        entry: make race
        language: system
        files: '\.go$|go\.(mod|sum)$|testdata/'
        pass_filenames: false
      - id: go-build
        name: go build
        entry: make build
        language: system
        files: '\.go$|go\.(mod|sum)$'
        pass_filenames: false
